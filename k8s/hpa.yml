apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-backend
  namespace: todo-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-deployment

  minReplicas: 2 
  maxReplicas: 10

  metrices:
    - type: Resources
      resources:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
